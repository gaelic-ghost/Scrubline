name: Validate

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install the pinned Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal --component clippy,rustfmt

      - name: Verify the minimum supported Rust version
        run: |
          rustup toolchain install 1.85.0 --profile minimal
          cargo +1.85.0 check --locked

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint all targets and features
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Build the release binary
        run: cargo build --release
